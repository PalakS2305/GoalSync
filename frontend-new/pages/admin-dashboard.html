<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GoalSync — Admin Dashboard</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body class="dashboard-body">

  <nav class="navbar">
    <h2>🎯 GoalSync</h2>
    <div class="navbar-right">
      <span id="navUserName">Loading...</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="dashboard-content">

    <div class="welcome-card">
      <h1>
        Welcome, <span id="userName">...</span>!
        <span class="role-badge badge-admin">Admin</span>
      </h1>
      <p>Manage users, push shared goals, unlock approved goals, and view audit logs.</p>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="number">0</div>
        <div class="label">Total Users</div>
      </div>
      <div class="stat-card">
        <div class="number">0</div>
        <div class="label">Active Goals</div>
      </div>
      <div class="stat-card">
        <div class="number">0</div>
        <div class="label">Audit Logs</div>
      </div>
    </div>

  </div>

  <script src="../js/auth.js"></script>
  <script>
    const user = requireAuth('admin');

    if (user) {
      document.getElementById('userName').textContent    = user.name;
      document.getElementById('navUserName').textContent = user.name;
    }
  </script>

</body>
</html>
